seed: 42
output_dir: outputs/full_jpt

model:
  backbone_name_or_path: Qwen3.5-2B
  cache_dir: null
  trust_remote_code: true
  torch_dtype: bfloat16
  hidden_size: 2048
  projection_dim: 256
  token_mlp_hidden_dims: [1024]
  entity_mlp_hidden_dims: [1024]
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj]
  entity_pooling: mean
  classifier_type: bilinear
  use_definitions: true
  use_jpt: true
  separator_token: "<|endoftext|>"
  max_length: 384

data:
  dataset_name: conll2003
  dataset_config_name: null
  train_split: train
  validation_split: validation
  test_split: test
  text_column: tokens
  label_column: ner_tags
  scheme: BIOES
  max_examples: null
  definition_style: long

training:
  epochs: 5
  batch_size: 2
  eval_batch_size: 2
  grad_accum_steps: 4
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  log_every_steps: 10
  eval_every_steps: 100
  save_every_steps: 100
  num_workers: 0
  loss_type: weighted_ce
  focal_gamma: 2.0
  class_weighting: balanced
  amp: true

inference:
  batch_size: 4
  save_predictions_path: null

definitions:
  cache_path: cache/definitions/conll2003_qwen3.5-2b.pt
  use_label_name_only: false
