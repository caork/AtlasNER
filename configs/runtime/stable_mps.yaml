output_dir: outputs/stable/full_jpt

model:
  torch_dtype: bfloat16
  max_length: 256
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  gradient_checkpointing: true

data:
  max_examples: 500

training:
  epochs: 5
  batch_size: 1
  eval_batch_size: 2
  grad_accum_steps: 8
  learning_rate: 2.0e-5
  head_learning_rate: 5.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  log_every_steps: 20
  eval_every_steps: 100
  save_every_steps: 100
  num_workers: 0
  class_weighting: balanced
  amp: false

definitions:
  cache_path: cache/definitions/conll2003_qwen3.5-2b_stable.pt
