seed: 42
output_dir: outputs/pilot/full_jpt

model:
  torch_dtype: float16
  max_length: 128
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05

data:
  dataset_name: conll2003
  scheme: BIOES
  max_examples: 16

training:
  epochs: 1
  batch_size: 1
  eval_batch_size: 1
  grad_accum_steps: 4
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  log_every_steps: 5
  eval_every_steps: 100000
  save_every_steps: 100000
  num_workers: 0
  class_weighting: none
  amp: false

definitions:
  cache_path: cache/definitions/pilot_full_jpt.pt
